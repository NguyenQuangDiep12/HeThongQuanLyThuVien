<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - LibraryHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/global.css" rel="stylesheet">
</head>
<body>
    <nav id="sidebar" class="sidebar"><div class="sidebar-brand"><i class="bi bi-book-half"></i><h5>LibraryHub</h5></div><nav class="nav flex-column py-2" id="sidebarNav"></nav></nav>
    <div class="main-content">
        <header class="topbar d-flex align-items-center justify-content-between px-4">
            <div class="d-flex align-items-center gap-3"><button class="btn btn-link text-dark" id="sidebarToggle"><i class="bi bi-list fs-4"></i></button><h5 class="mb-0" id="pageTitle">Hồ sơ cá nhân</h5></div>
            <div class="d-flex align-items-center gap-2"><div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:36px;height:36px" id="userAvatar">U</div><div class="d-none d-sm-block"><div class="fw-semibold small" id="userName"></div><div class="text-muted" style="font-size:0.7rem" id="userRole"></div></div><button class="btn btn-outline-secondary btn-sm" id="btnLogout"><i class="bi bi-box-arrow-right"></i></button></div>
        </header>
        <div class="content">
            <div class="row g-3">
                <div class="col-md-8">
                    <div class="card shadow-sm mb-3"><div class="card-header fw-semibold">Thông tin cá nhân</div><div class="card-body">
                        <div class="mb-3 text-center"><img id="avatarPreview" src="" class="rounded-circle" style="width:80px;height:80px;object-fit:cover;display:none" alt=""></div>
                        <div class="mb-3"><label class="form-label">Họ tên</label><input type="text" id="profFullName" class="form-control"></div>
                        <div class="mb-3"><label class="form-label">Email</label><input type="email" id="profEmail" class="form-control" disabled></div>
                        <div class="mb-3"><label class="form-label">Số điện thoại</label><input type="text" id="profPhone" class="form-control"></div>
                        <div class="mb-3"><label class="form-label">Địa chỉ</label><input type="text" id="profAddress" class="form-control"></div>
                        <div class="mb-3"><label class="form-label">Avatar URL</label><input type="url" id="profAvatar" class="form-control"></div>
                        <button class="btn btn-primary" id="btnUpdateProfile"><i class="bi bi-save me-1"></i>Cập nhật</button>
                    </div></div>
                    <div class="card shadow-sm"><div class="card-header fw-semibold">Đổi mật khẩu</div><div class="card-body"><form id="passwordForm">
                        <div class="mb-3"><label class="form-label">Mật khẩu cũ</label><input type="password" id="oldPassword" class="form-control"></div>
                        <div class="mb-3"><label class="form-label">Mật khẩu mới</label><input type="password" id="newPassword" class="form-control" minlength="6"></div>
                        <div class="mb-3"><label class="form-label">Xác nhận mật khẩu</label><input type="password" id="confirmPassword" class="form-control"></div>
                        <button type="button" class="btn btn-warning" id="btnChangePassword"><i class="bi bi-key me-1"></i>Đổi mật khẩu</button>
                    </form></div></div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm"><div class="card-header fw-semibold">Thông tin tài khoản</div><div class="card-body">
                        <p><small class="text-muted">Vai trò</small><br><span id="profRole">—</span></p>
                        <p><small class="text-muted">Trạng thái</small><br><span id="profStatus">—</span></p>
                        <p><small class="text-muted">Mã thẻ</small><br><span id="profCard">—</span></p>
                        <p><small class="text-muted">Thẻ</small><br><span id="profCardStatus">—</span></p>
                    </div></div>
                </div>
            </div>
        </div>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"><div id="appToast" class="toast align-items-center border-0"><div class="d-flex"><div class="toast-body" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div></div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/utils.js"></script><script src="/js/layout.js"></script><script src="profile.js"></script>
</body>
</html>
