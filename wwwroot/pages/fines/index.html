<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vi phạm - LibraryHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/global.css" rel="stylesheet">
</head>
<body>
    <nav id="sidebar" class="sidebar"><div class="sidebar-brand"><i class="bi bi-book-half"></i><h5>LibraryHub</h5></div><nav class="nav flex-column py-2" id="sidebarNav"></nav></nav>
    <div class="main-content">
        <header class="topbar d-flex align-items-center justify-content-between px-4">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-link text-dark" id="sidebarToggle"><i class="bi bi-list fs-4"></i></button>
                <h5 class="mb-0" id="pageTitle">Vi phạm</h5>
            </div>
            <div class="d-flex align-items-center gap-2">
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:36px;height:36px" id="userAvatar">U</div>
                <div class="d-none d-sm-block"><div class="fw-semibold small" id="userName"></div><div class="text-muted" style="font-size:0.7rem" id="userRole"></div></div>
                <button class="btn btn-outline-secondary btn-sm" id="btnLogout"><i class="bi bi-box-arrow-right"></i></button>
            </div>
        </header>
        <div class="content">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">Danh sách phiếu phạt</span>
                    <button class="btn btn-primary btn-sm" id="btnCreate"><i class="bi bi-plus-lg me-1"></i>Tạo phiếu phạt</button>
                </div>
                <form id="searchForm" class="card-body border-bottom py-2">
                    <button type="submit" class="btn btn-outline-primary btn-sm"><i class="bi bi-arrow-clockwise me-1"></i>Tải lại</button>
                </form>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr><th>Độc giả</th><th>Mã phiếu mượn</th><th>Loại vi phạm</th><th>Số tiền</th><th>Thanh toán</th><th>Ngày tạo</th><th class="text-center">Thao tác</th></tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div class="card-footer d-flex justify-content-between">
                    <small>Hiển thị <span id="showingCount">0</span> / <span id="totalCount">0</span></small>
                    <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Tạo phiếu phạt -->
    <div class="modal fade" id="fineModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Tạo phiếu phạt</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Borrow Detail ID <span class="text-danger">*</span></label>
                        <input type="number" id="fineBorrowDetailId" class="form-control" min="1" placeholder="ID chi tiết phiếu mượn">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Loại vi phạm <span class="text-danger">*</span></label>
                        <!-- FIX: option values phải là UPPERCASE enum: OVERDUE / DAMAGED / LOST -->
                        <select id="fineType" class="form-select">
                            <option value="OVERDUE">Quá hạn</option>
                            <option value="DAMAGED">Hư hỏng sách</option>
                            <option value="LOST">Mất sách</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Số tiền phạt (VNĐ) <span class="text-danger">*</span></label>
                        <input type="number" id="fineAmount" class="form-control" min="1000" step="1000" placeholder="Tối thiểu 1,000 VNĐ">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Lý do</label>
                        <textarea id="fineReason" class="form-control" rows="2" placeholder="Mô tả lý do phạt..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" id="btnSaveFine">Tạo phiếu phạt</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirm -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="confirmModalTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body" id="confirmModalBody"></div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Hủy</button><button type="button" class="btn btn-danger btn-sm" id="btnConfirmAction">Xác nhận</button></div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"><div id="appToast" class="toast align-items-center border-0"><div class="d-flex"><div class="toast-body" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div></div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/layout.js"></script>
    <script src="fines.js"></script>
</body>
</html>
