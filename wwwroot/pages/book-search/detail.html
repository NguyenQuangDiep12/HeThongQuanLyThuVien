<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sách - LibraryHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/global.css" rel="stylesheet">
</head>
<body>
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-brand"><i class="bi bi-book-half"></i><h5>LibraryHub</h5></div>
        <nav class="nav flex-column py-2" id="sidebarNav"></nav>
    </nav>
    <div class="main-content">
        <header class="topbar d-flex align-items-center justify-content-between px-4">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-link text-dark" id="sidebarToggle"><i class="bi bi-list fs-4"></i></button>
                <h5 class="mb-0" id="pageTitle">Chi tiết sách</h5>
            </div>
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-link position-relative text-dark" id="notificationBell"><i class="bi bi-bell fs-5"></i><span class="badge bg-danger rounded-pill" id="notificationBadge" style="display:none">0</span></button>
                <div class="d-flex align-items-center gap-2">
                    <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:36px;height:36px" id="userAvatar">U</div>
                    <button class="btn btn-outline-secondary btn-sm" id="btnLogout"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </header>
        <div class="content">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Tra cứu sách</a></li>
                    <li class="breadcrumb-item active" id="breadcrumbTitle">Chi tiết</li>
                </ol>
            </nav>
            <div id="bookDetail"><div class="text-center py-5"><div class="spinner-border text-primary"></div></div></div>
        </div>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
        <div id="appToast" class="toast align-items-center border-0" role="alert"><div class="d-flex"><div class="toast-body" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/utils.js"></script><script src="/js/layout.js"></script>
    <script>
        $(document).ready(function () {
            if (!checkAuth(null)) return;
            initLayout('Chi tiết sách');
            const bookId = getQueryParam('bookId');
            if (!bookId) { window.location.href = 'index.html'; return; }

            BookAPI.getById(bookId, function (err, res) {
                if (err) { showToast('error', err.message); return; }
                const b = res.data;
                $('#breadcrumbTitle').text(b.title);
                const avail = b.availableCopies > 0;
                const cover = b.coverImage
                    ? '<img src="' + escapeHtml(b.coverImage) + '" class="img-fluid rounded shadow" style="max-height:320px">'
                    : '<div class="placeholder-cover rounded" style="height:320px"><i class="bi bi-book"></i></div>';

                let html = '<div class="card shadow-sm"><div class="card-body"><div class="row g-4">';
                html += '<div class="col-md-4">' + cover + '</div>';
                html += '<div class="col-md-8"><h3>' + escapeHtml(b.title) + '</h3>';
                html += '<p class="text-muted">ISBN: ' + escapeHtml(b.isbn) + '</p>';
                html += avail ? '<span class="badge bg-success fs-6 mb-3">Còn sách (' + b.availableCopies + '/' + b.totalCopies + ')</span>'
                    : '<span class="badge bg-secondary fs-6 mb-3">Hết sách</span>';
                html += '<table class="table table-sm"><tbody>';
                html += '<tr><th width="120">Tác giả</th><td>' + getAuthorsText(b.authors) + '</td></tr>';
                html += '<tr><th>NXB</th><td>' + (b.publisher ? escapeHtml(b.publisher.publisherName || b.publisher.name) : '—') + '</td></tr>';
                html += '<tr><th>Danh mục</th><td>' + getCategoriesText(b.categories) + '</td></tr>';
                html += '<tr><th>Ngôn ngữ</th><td>' + escapeHtml(b.language) + '</td></tr>';
                html += '<tr><th>Mô tả</th><td>' + escapeHtml(b.description || 'Không có mô tả') + '</td></tr>';
                html += '</tbody></table></div></div></div></div>';

                $('#bookDetail').html(html);
            });
        });
    </script>
</body>
</html>
