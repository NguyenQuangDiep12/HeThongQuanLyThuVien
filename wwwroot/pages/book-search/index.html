<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu sách - LibraryHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/global.css" rel="stylesheet">
</head>
<body>
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-brand"><i class="bi bi-book-half"></i><h5>LibraryHub</h5></div>
        <nav class="nav flex-column py-2" id="sidebarNav"></nav>
    </nav>
    <div class="main-content">
        <header class="topbar d-flex align-items-center justify-content-between px-4">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-link text-dark" id="sidebarToggle"><i class="bi bi-list fs-4"></i></button>
                <h5 class="mb-0" id="pageTitle">Tra cứu sách</h5>
            </div>
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-link position-relative text-dark" id="notificationBell"><i class="bi bi-bell fs-5"></i><span class="badge bg-danger rounded-pill" id="notificationBadge" style="display:none">0</span></button>
                <div class="d-flex align-items-center gap-2">
                    <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:36px;height:36px" id="userAvatar">U</div>
                    <div class="d-none d-sm-block"><div class="fw-semibold small" id="userName">User</div><div class="text-muted" style="font-size:0.7rem" id="userRole">ROLE</div></div>
                    <button class="btn btn-outline-secondary btn-sm" id="btnLogout"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </header>
        <div class="content">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form id="searchForm" class="row g-2 align-items-end">
                        <div class="col-md-4"><input type="text" id="filterKeyword" class="form-control" placeholder="Tìm theo tên sách..."></div>
                        <div class="col-md-3"><select id="filterCategory" class="form-select"><option value="">-- Tất cả danh mục --</option></select></div>
                        <div class="col-md-3"><input type="text" id="filterAuthor" class="form-control" placeholder="Tác giả (sắp có)"></div>
                        <div class="col-auto">
                            <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-search me-1"></i>Tìm kiếm</button>
                            <button type="button" id="btnReset" class="btn btn-outline-secondary btn-sm"><i class="bi bi-x-circle me-1"></i>Đặt lại</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="row g-3" id="bookGrid"></div>
            <div class="d-flex justify-content-between align-items-center mt-3">
                <small class="text-muted">Hiển thị <span id="showingCount">0</span> / <span id="totalCount">0</span> kết quả</small>
                <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
            </div>
        </div>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
        <div id="appToast" class="toast align-items-center border-0" role="alert"><div class="d-flex"><div class="toast-body" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/utils.js"></script><script src="/js/layout.js"></script>
    <script src="book-search.js"></script>
</body>
</html>
