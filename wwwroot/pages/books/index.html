<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sách - LibraryHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/global.css" rel="stylesheet">
</head>
<body>
    <nav id="sidebar" class="sidebar"><div class="sidebar-brand"><i class="bi bi-book-half"></i><h5>LibraryHub</h5></div><nav class="nav flex-column py-2" id="sidebarNav"></nav></nav>
    <div class="main-content">
        <header class="topbar d-flex align-items-center justify-content-between px-4">
            <div class="d-flex align-items-center gap-3"><button class="btn btn-link text-dark" id="sidebarToggle"><i class="bi bi-list fs-4"></i></button><h5 class="mb-0" id="pageTitle">Quản lý sách</h5></div>
            <div class="d-flex align-items-center gap-2"><div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:36px;height:36px" id="userAvatar">U</div><div class="d-none d-sm-block"><div class="fw-semibold small" id="userName"></div><div class="text-muted" style="font-size:0.7rem" id="userRole"></div></div><button class="btn btn-outline-secondary btn-sm" id="btnLogout"><i class="bi bi-box-arrow-right"></i></button></div>
        </header>
        <div class="content">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center"><span class="fw-semibold">Danh sách đầu sách</span><button class="btn btn-primary btn-sm" id="btnCreate"><i class="bi bi-plus-lg me-1"></i>Thêm mới</button></div>
                <div class="card-body border-bottom py-2">
                    <form id="searchForm" class="row g-2 align-items-end">
                        <div class="col-md-4"><input type="text" id="filterKeyword" class="form-control form-control-sm" placeholder="Tìm theo tên..."></div>
                        <div class="col-md-3"><select id="filterCategory" class="form-select form-select-sm"><option value="">-- Danh mục --</option></select></div>
                        <div class="col-auto"><button type="submit" class="btn btn-outline-primary btn-sm"><i class="bi bi-search"></i> Tìm</button><button type="button" id="btnReset" class="btn btn-outline-secondary btn-sm">Đặt lại</button></div>
                    </form>
                </div>
                <div class="card-body p-0"><div class="table-responsive"><table class="table table-hover table-bordered mb-0"><thead class="table-light"><tr><th>STT</th><th>Tên sách</th><th>ISBN</th><th>Bản sao</th><th class="text-center">Thao tác</th></tr></thead><tbody id="tableBody"></tbody></table></div></div>
                <div class="card-footer d-flex justify-content-between align-items-center"><small class="text-muted">Hiển thị <span id="showingCount">0</span> / <span id="totalCount">0</span></small><nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav></div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="bookModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="bookModalTitle">Thêm đầu sách</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><form id="bookForm"><div class="row g-3">
            <div class="col-md-8"><label class="form-label">Tên sách *</label><input type="text" id="bookTitle" class="form-control"><div class="form-error text-danger small" id="bookTitleError"></div></div>
            <div class="col-md-4"><label class="form-label">ISBN *</label><input type="text" id="bookIsbn" class="form-control"><div class="form-error text-danger small" id="bookIsbnError"></div></div>
            <div class="col-md-4"><label class="form-label">Ngôn ngữ</label><input type="text" id="bookLanguage" class="form-control" value="vi"></div>
            <div class="col-md-8"><label class="form-label">Ảnh bìa (URL)</label><input type="url" id="bookCover" class="form-control" placeholder="https://..."></div>
            <div class="col-12"><label class="form-label">Mô tả</label><textarea id="bookDescription" class="form-control" rows="2"></textarea></div>
            <div class="col-md-4"><label class="form-label">NXB *</label><select id="bookPublisher" class="form-select"></select></div>
            <div class="col-md-4"><label class="form-label">Tác giả *</label><select id="bookAuthors" class="form-select" multiple size="4"></select></div>
            <div class="col-md-4"><label class="form-label">Danh mục *</label><select id="bookCategories" class="form-select" multiple size="4"></select></div>
        </div></form></div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button><button type="button" class="btn btn-primary" id="btnSaveBook"><i class="bi bi-save me-1"></i>Lưu</button></div>
    </div></div></div>
    <div class="modal fade" id="deleteModal" tabindex="-1"><div class="modal-dialog modal-sm"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title text-danger"><i class="bi bi-exclamation-triangle"></i> Xác nhận xóa</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">Xóa sách <strong id="deleteItemName"></strong>?</div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Hủy</button><button type="button" class="btn btn-danger btn-sm" id="btnConfirmDelete">Xóa</button></div>
    </div></div></div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"><div id="appToast" class="toast align-items-center border-0"><div class="d-flex"><div class="toast-body" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div></div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/utils.js"></script><script src="/js/layout.js"></script><script src="books.js"></script>
</body>
</html>
