<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LibraryHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/global.css" rel="stylesheet">
</head>
<body>
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-brand"><i class="bi bi-book-half"></i><h5>LibraryHub</h5></div>
        <nav class="nav flex-column py-2" id="sidebarNav"></nav>
    </nav>
    <div class="main-content">
        <header class="topbar d-flex align-items-center justify-content-between px-4">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-link text-dark" id="sidebarToggle"><i class="bi bi-list fs-4"></i></button>
                <h5 class="mb-0" id="pageTitle">Dashboard</h5>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center gap-2">
                    <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:36px;height:36px" id="userAvatar">U</div>
                    <div class="d-none d-sm-block"><div class="fw-semibold small" id="userName">User</div><div class="text-muted" style="font-size:0.7rem" id="userRole">ROLE</div></div>
                    <button class="btn btn-outline-secondary btn-sm" id="btnLogout"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </header>
        <div class="content">
            <div class="row g-3 mb-4">
                <div class="col-md-3"><div class="card stat-card"><div class="card-body"><div class="text-muted small">Tổng sách</div><div class="stat-value text-primary" id="statBooks">—</div></div></div></div>
                <div class="col-md-3"><div class="card stat-card success"><div class="card-body"><div class="text-muted small">Tổng người dùng</div><div class="stat-value text-success" id="statUsers">—</div></div></div></div>
                <div class="col-md-3"><div class="card stat-card info"><div class="card-body"><div class="text-muted small">Phiếu mượn</div><div class="stat-value text-info" id="statBorrowing">—</div></div></div></div>
                <div class="col-md-3"><div class="card stat-card danger"><div class="card-body"><div class="text-muted small">Quá hạn</div><div class="stat-value text-danger" id="statOverdue">—</div></div></div></div>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header fw-semibold"><i class="bi bi-trophy me-1"></i> Top sách mượn nhiều</div>
                        <div class="card-body p-0">
                            <table class="table table-hover mb-0">
                                <thead class="table-light"><tr><th>#</th><th>Tên sách</th><th class="text-center">Lượt mượn</th></tr></thead>
                                <tbody id="topBooksBody"><tr><td colspan="3" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header fw-semibold text-danger"><i class="bi bi-exclamation-triangle me-1"></i> Phiếu quá hạn cần xử lý</div>
                        <div class="card-body p-0">
                            <table class="table table-hover mb-0">
                                <thead class="table-light"><tr><th>Độc giả</th><th>Hạn trả</th><th>Quá hạn</th></tr></thead>
                                <tbody id="overdueBody"><tr><td colspan="3" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
        <div id="appToast" class="toast align-items-center border-0" role="alert"><div class="d-flex"><div class="toast-body" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/utils.js"></script><script src="/js/layout.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
