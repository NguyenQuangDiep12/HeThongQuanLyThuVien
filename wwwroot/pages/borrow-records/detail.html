<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết phiếu mượn - LibraryHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/global.css" rel="stylesheet">
</head>
<body>
    <nav id="sidebar" class="sidebar"><div class="sidebar-brand"><i class="bi bi-book-half"></i><h5>LibraryHub</h5></div><nav class="nav flex-column py-2" id="sidebarNav"></nav></nav>
    <div class="main-content">
        <header class="topbar d-flex align-items-center justify-content-between px-4">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-link text-dark" id="sidebarToggle"><i class="bi bi-list fs-4"></i></button>
                <h5 class="mb-0" id="pageTitle">Chi tiết phiếu mượn</h5>
            </div>
            <div class="d-flex align-items-center gap-2">
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:36px;height:36px" id="userAvatar">U</div>
                <div class="d-none d-sm-block"><div class="fw-semibold small" id="userName"></div><div class="text-muted" style="font-size:0.7rem" id="userRole"></div></div>
                <button class="btn btn-outline-secondary btn-sm" id="btnLogout"><i class="bi bi-box-arrow-right"></i></button>
            </div>
        </header>
        <div class="content">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Phiếu mượn</a></li>
                    <li class="breadcrumb-item active" id="borrowCode">—</li>
                </ol>
            </nav>

            <div class="card shadow-sm mb-3">
                <div class="card-header fw-semibold"><i class="bi bi-journal-text me-2"></i>Thông tin phiếu mượn</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3"><small class="text-muted d-block">Độc giả</small><span class="fw-semibold" id="readerName">—</span></div>
                        <div class="col-md-2"><small class="text-muted d-block">Ngày mượn</small><span id="borrowDate">—</span></div>
                        <div class="col-md-2"><small class="text-muted d-block">Hạn trả</small><span id="dueDate">—</span></div>
                        <div class="col-md-2"><small class="text-muted d-block">Trạng thái</small><span id="status">—</span></div>
                        <div class="col-md-1"><small class="text-muted d-block">Loại</small><span id="borrowType">—</span></div>
                        <div class="col-md-2"><small class="text-muted d-block">Gia hạn</small><span id="extensionCount">—</span></div>
                        <div class="col-md-3"><small class="text-muted d-block">Người duyệt</small><span id="approverName">—</span></div>
                    </div>
                    <div class="mt-3 d-flex gap-2">
                        <button class="btn btn-success btn-sm" id="btnReturn" style="display:none"><i class="bi bi-check-circle me-1"></i>Xác nhận trả sách</button>
                        <button class="btn btn-warning btn-sm" id="btnExtend" style="display:none"><i class="bi bi-calendar-plus me-1"></i>Gia hạn</button>
                        <button class="btn btn-outline-danger btn-sm" id="btnCancel" style="display:none"><i class="bi bi-x-circle me-1"></i>Hủy phiếu</button>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header fw-semibold"><i class="bi bi-collection me-2"></i>Danh sách sách mượn</div>
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>Tên sách</th><th>Barcode</th><th>Trạng thái</th><th>Ngày trả</th></tr>
                    </thead>
                    <tbody id="detailsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Trả sách (có fineAmount) -->
    <div class="modal fade" id="returnModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-check-circle me-2 text-success"></i>Xác nhận trả sách</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="returnItems"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-success" id="btnConfirmReturn"><i class="bi bi-check-lg me-1"></i>Xác nhận trả</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirm -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="confirmModalTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body" id="confirmModalBody"></div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Hủy</button><button type="button" class="btn btn-danger btn-sm" id="btnConfirmAction">Xác nhận</button></div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"><div id="appToast" class="toast align-items-center border-0"><div class="d-flex"><div class="toast-body" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div></div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/layout.js"></script>
    <script src="borrow-records.js"></script>
</body>
</html>
