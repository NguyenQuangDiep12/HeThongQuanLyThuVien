<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Độc giả - LibraryHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/global.css" rel="stylesheet">
</head>
<body>
    <nav id="sidebar" class="sidebar"><div class="sidebar-brand"><i class="bi bi-book-half"></i><h5>LibraryHub</h5></div><nav class="nav flex-column py-2" id="sidebarNav"></nav></nav>
    <div class="main-content">
        <header class="topbar d-flex align-items-center justify-content-between px-4">
            <div class="d-flex align-items-center gap-3"><button class="btn btn-link text-dark" id="sidebarToggle"><i class="bi bi-list fs-4"></i></button><h5 class="mb-0" id="pageTitle">Độc giả</h5></div>
            <button class="btn btn-outline-secondary btn-sm" id="btnLogout"><i class="bi bi-box-arrow-right"></i></button>
        </header>
        <div class="content">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Danh sách độc giả</div>
                <div class="card-body border-bottom py-2">
                    <form id="searchForm" class="row g-2"><div class="col-md-4"><input type="text" id="filterName" class="form-control form-control-sm" placeholder="Họ tên..."></div>
                    <div class="col-md-4"><input type="text" id="filterEmail" class="form-control form-control-sm" placeholder="Email..."></div>
                    <div class="col-auto"><button type="submit" class="btn btn-outline-primary btn-sm">Tìm</button><button type="button" id="btnReset" class="btn btn-outline-secondary btn-sm">Đặt lại</button></div></form>
                </div>
                <div class="table-responsive"><table class="table table-hover mb-0"><thead class="table-light"><tr><th>Họ tên</th><th>Email</th><th>SĐT</th><th>TK</th><th>Thẻ</th><th class="text-center">Chi tiết</th></tr></thead><tbody id="tableBody"></tbody></table></div>
                <div class="card-footer d-flex justify-content-between"><small>Hiển thị <span id="showingCount">0</span> / <span id="totalCount">0</span></small><ul class="pagination pagination-sm mb-0" id="pagination"></ul></div>
            </div>
        </div>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"><div id="appToast" class="toast align-items-center border-0"><div class="d-flex"><div class="toast-body" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div></div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/utils.js"></script><script src="/js/layout.js"></script><script src="users.js"></script>
</body>
</html>
